<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dandy Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #2b2b2b; 
            -webkit-font-smoothing: antialiased;
        }
        .btn-altegio {
            background-color: #ffda3b;
            color: #1c1c1e;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-altegio:active { transform: scale(0.96); background-color: #f2ce35; }
        
        .btn-whatsapp {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
            transition: all 0.2s ease;
        }
        .btn-whatsapp:active { background-color: rgba(255, 255, 255, 0.1); transform: scale(0.96); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen overflow-hidden px-6">

    <div class="flex flex-col items-center w-full max-w-[280px]">
        
        <!-- Заголовок -->
        <h1 class="text-[52px] leading-tight font-light tracking-tight text-white mb-0 italic">
            Dandy
        </h1>
        
        <p class="text-[11px] uppercase tracking-[0.5em] text-gray-400 mb-14 font-medium italic">
            Barbershop
        </p>
        
        <!-- Кнопка Altegio (Основная) -->
        <a href="https://n109776.alteg.io" 
           class="btn-altegio w-full py-4 text-[16px] font-bold text-center rounded-[22px] mb-4">
            Записаться онлайн
        </a>

        <!-- Кнопка WhatsApp (Вторичная) -->
        <a href="https://wa.me" 
           class="btn-whatsapp w-full py-3.5 text-[14px] font-medium text-center rounded-[22px] mb-8">
            Написать в WhatsApp
        </a>

        <!-- Адрес -->
        <p class="text-[13px] text-gray-300 font-light tracking-wide">
            Кармысова 30/3
        </p>

    </div>

    <!-- Футер -->
    <div class="absolute bottom-10 flex flex-col items-center">
        <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-medium">
            Est. 2014 • Almaty
        </p>
    </div>

</body>
</html>
