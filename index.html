<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dandy Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #ffffff; /* Белый фон как в Altegio */
            -webkit-font-smoothing: antialiased;
        }
        /* Тот самый "желток" Altegio */
        .btn-altegio {
            background-color: #ffda3b;
            color: #1c1c1e;
            transition: all 0.2s ease;
        }
        .btn-altegio:active {
            transform: scale(0.96);
            background-color: #f2ce35;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen overflow-hidden px-6">

    <!-- Контент строго по центру -->
    <div class="flex flex-col items-center w-full max-w-sm">
        
        <!-- Заголовок в стиле премиум-минимализма -->
        <h1 class="text-[44px] leading-tight font-light tracking-tight text-[#1c1c1e] mb-1 italic">
            Dandy
        </h1>
        
        <p class="text-[12px] uppercase tracking-[0.5em] text-[#8e8e93] mb-12 font-medium">
            Barbershop
        </p>
        
        <!-- Кнопка с идеальным скруглением iOS (24px) -->
        <a href="https://n109776.alteg.io" 
           class="btn-altegio w-full py-4 text-[15px] font-semibold text-center rounded-[18px] shadow-sm">
            Записаться онлайн
        </a>

    </div>

    <!-- Футер -->
    <div class="absolute bottom-12 flex flex-col items-center">
        <div class="h-[1px] w-8 bg-[#e5e5ea] mb-4"></div>
        <p class="text-[10px] uppercase tracking-[0.2em] text-[#aeaeb2] font-medium">
            Est. 2014 • Almaty
        </p>
    </div>

</body>
</html>
