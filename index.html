<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dandy Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #2b2b2b; /* Теплый графит / Антрацит */
            -webkit-font-smoothing: antialiased;
        }
        /* Кнопка Altegio */
        .btn-altegio {
            background-color: #ffda3b;
            color: #1c1c1e;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 14px 0 rgba(255, 218, 59, 0.2);
        }
        .btn-altegio:active {
            transform: scale(0.96);
            background-color: #f2ce35;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen overflow-hidden px-6">

    <div class="flex flex-col items-center w-full max-w-[280px]">
        
        <!-- Заголовок белый для контраста с графитом -->
        <h1 class="text-[52px] leading-tight font-light tracking-tight text-white mb-0 italic">
            Dandy
        </h1>
        
        <p class="text-[11px] uppercase tracking-[0.5em] text-gray-400 mb-14 font-medium">
            Barbershop
        </p>
        
        <!-- Кнопка в стиле iOS, отцентрирована -->
        <a href="https://n109776.alteg.io" 
           class="btn-altegio w-full py-4.5 text-[16px] font-bold text-center rounded-[22px]">
            Записаться онлайн
        </a>

    </div>

    <!-- Футер -->
    <div class="absolute bottom-12 flex flex-col items-center">
        <div class="h-[1px] w-6 bg-gray-500 mb-4 opacity-40"></div>
        <p class="text-[9px] uppercase tracking-[0.3em] text-gray-500 font-medium">
            Est. 2014 • Almaty
        </p>
    </div>

</body>
</html>
