<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dandy Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000; 
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen text-center px-6">

    <!-- Основной блок -->
    <div class="flex flex-col items-center">
        <h1 class="text-6xl md:text-8xl font-bold tracking-tighter mb-2 uppercase italic">
            Dandy
        </h1>
        <p class="text-sm md:text-base mb-10 tracking-[0.4em] text-gray-400 uppercase">
            Barbershop
        </p>
        
        <!-- Кнопка в стиле iOS / Теплый желток -->
        <a href="https://n109776.alteg.io" 
           class="inline-block bg-[#FFCF40] text-black px-12 py-4 text-base font-semibold rounded-[20px] shadow-lg active:scale-95 transition-all duration-200">
            Записаться онлайн
        </a>
    </div>

    <!-- Футер с правильным годом -->
    <div class="absolute bottom-10 text-[10px] uppercase tracking-[0.3em] text-gray-600">
        Professional Grooming • Est. 2014
    </div>

</body>
</html>
