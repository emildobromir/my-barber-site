<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dandy Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com');
        body { font-family: 'Inter', sans-serif; background-color: #000; }
    </style>
</head>
<body class="text-white flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Фоновое изображение (замени URL на свою картинку, если нужно) -->
    <div class="fixed inset-0 z-[-1] opacity-50">
        <img src="https://static.tildacdn.com" 
             class="w-full h-full object-cover filter grayscale" alt="background">
    </div>

    <!-- Контент -->
    <div class="text-center max-w-lg">
        <h1 class="text-5xl md:text-7xl font-bold tracking-tighter mb-4 uppercase">
            Dandy
        </h1>
        <p class="text-lg md:text-xl mb-8 font-light tracking-widest text-gray-300">
            BARBERSHOP
        </p>
        
        <a href="https://n109776.alteg.io" 
           class="inline-block bg-white text-black px-10 py-4 text-sm font-bold uppercase tracking-widest hover:bg-gray-200 transition-all duration-300">
            Записаться онлайн
        </a>
    </div>

    <!-- Футер -->
    <div class="absolute bottom-8 text-[10px] uppercase tracking-[0.3em] text-gray-500">
        Professional Grooming • Est. 2024
    </div>

</body>
</html>
