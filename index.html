<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dandy Barbershop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background-color: #696969; /* Тот самый DimGray */
            -webkit-font-smoothing: antialiased;
        }
        /* Кнопка "желток" Altegio */
        .btn-altegio {
            background-color: #ffda3b;
            color: #1c1c1e;
            transition: all 0.2s ease;
        }
        .btn-altegio:active {
            transform: scale(0.96);
            background-color: #f2ce35;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen overflow-hidden px-6">

    <!-- Контент строго по центру -->
    <div class="flex flex-col items-center w-full max-w-[280px]">
        
        <!-- Заголовок в белом цвете для контраста с серым -->
        <h1 class="text-[48px] leading-tight font-light tracking-tight text-white mb-1 italic">
            Dandy
        </h1>
        
        <p class="text-[11px] uppercase tracking-[0.5em] text-gray-300 mb-12 font-medium">
            Barbershop
        </p>
        
        <!-- Кнопка в стиле iOS -->
        <a href="https://n109776.alteg.io" 
           class="btn-altegio w-full py-4 text-[15px] font-semibold text-center rounded-[20px] shadow-lg">
            Записаться онлайн
        </a>

    </div>

    <!-- Футер -->
    <div class="absolute bottom-12 flex flex-col items-center">
        <div class="h-[1px] w-8 bg-gray-400 mb-4 opacity-30"></div>
        <p class="text-[10px] uppercase tracking-[0.2em] text-gray-300 font-medium">
            Est. 2014 • Almaty
        </p>
    </div>

</body>
</html>
